name: Security Analysis

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ========== SOBELOW ==========
  sobelow:
    name: Sobelow (Security)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.4'
          otp-version: '27.3.4'
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-sobelow-${{ hashFiles('mix.lock') }}
      - run: mix deps.get
      - name: Run Sobelow
        run: |
          mix sobelow --exit-on-warn --format json > sobelow.json 2>&1 || true
          if [ ! -s sobelow.json ]; then echo '[]' > sobelow.json; fi
      - name: Summary
        run: |
          echo "=== SOBELOW FINDINGS ===" && cat sobelow.json | jq 'length'
      - uses: actions/upload-artifact@v4
        with:
          name: sobelow-report
          path: sobelow.json

  # ========== CREDO ==========
  credo:
    name: Credo (Code Quality)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.4'
          otp-version: '27.3.4'
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-credo-${{ hashFiles('mix.lock') }}
      - run: mix deps.get
      - name: Run Credo
        run: |
          mix credo --strict --all --format json > credo.json 2>&1 || true
          if [ ! -s credo.json ]; then echo '{"issues":[]}' > credo.json; fi
      - name: Summary
        run: |
          echo "=== CREDO ISSUES ===" && cat credo.json | jq '.issues | length'
      - uses: actions/upload-artifact@v4
        with:
          name: credo-report
          path: credo.json

  # ========== DIALYZER ==========
  dialyzer:
    name: Dialyzer (Types)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.4'
          otp-version: '27.3.4'
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
          key: ${{ runner.os }}-mix-dialyzer-${{ hashFiles('mix.lock') }}
      - run: mix deps.get
      - name: Run Dialyzer
        run: |
          mix dialyzer --format json > dialyzer.json 2>&1 || true
          if [ ! -s dialyzer.json ]; then echo '[]' > dialyzer.json; fi
      - name: Summary
        run: |
          echo "=== DIALYZER ERRORS ===" && cat dialyzer.json | jq 'length' 2>/dev/null || echo "0"
      - uses: actions/upload-artifact@v4
        with:
          name: dialyzer-report
          path: dialyzer.json

  # ========== CONCUERROR ==========
  concuerror:
    name: Concuerror (Concurrency)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.4'
          otp-version: '27.3.4'
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-concuerror-${{ hashFiles('mix.lock') }}
      - run: mix deps.get
      - name: Install Concuerror
        run: mix escript.install hex concuerror
      - name: Compile test modules
        run: mix test --no-start --no-compile 2>&1 | head -5 || true
      - name: Run Concuerror on high-risk modules
        run: |
          for mod in \
            Teiserver.Account.Caches.UserCacheLib \
            Teiserver.Client \
            Teiserver.Lobby \
            Teiserver.Coordinator \
            Teiserver.Moderation.ActionLib \
            Teiserver.Account.SmurfMergeTask
          do
            echo "=== Checking $mod ==="
            concuerror -m "$mod" -t ".*" --timeout 60 2>&1 | head -30 || true
          done
      - name: Summary
        run: echo "Concuerror completed"

  # ========== SUMMARY ==========
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [sobelow, credo, dialyzer, concuerror]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports
      - name: Print All Findings
        run: |
          echo "========== SOBELOW ==========" && cat reports/sobelow-report/sobelow.json 2>/dev/null | jq 'length' || echo "0"
          echo "========== CREDO ==========" && cat reports/credo-report/credo.json 2>/dev/null | jq '.issues | length' || echo "0"
          echo "========== DIALYZER ==========" && cat reports/dialyzer-report/dialyzer.json 2>/dev/null | jq 'length' || echo "0"
          echo "========== DONE =========="
