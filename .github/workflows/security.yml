name: Security Analysis

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.4'
          otp-version: '27.3.4'
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
      - run: mix deps.get --only test
      - name: Sobelow (Security)
        run: mix sobelow --exit-on-warn --format json > sobelow.json || true
      - name: Credo (Quality)
        run: mix credo --strict --format json > credo.json || true
      - name: Dialyzer (Types)
        run: mix dialyzer --format json > dialyzer.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            sobelow.json
            credo.json
            dialyzer.json

  concuerror:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.4'
          otp-version: '27.3.4'
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
      - run: mix deps.get
      - name: Compile test modules
        run: mix test --no-start --no-compile 2>&1 | head -5 || true
      - name: Run Concuerror on high-risk modules
        run: |
          for mod in \
            Teiserver.Account.Caches.UserCacheLib \
            Teiserver.Client \
            Teiserver.Lobby \
            Teiserver.Coordinator \
            Teiserver.Moderation.ActionLib \
            Teiserver.Account.SmurfMergeTask
          do
            echo "=== Checking $mod ==="
            concuerror -m $mod -t ".*" --timeout 60 2>&1 | head -30 || true
          done
        continue-on-error: true

  proper:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.4'
          otp-version: '27.3.4'
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
      - run: mix deps.get
      - name: Run PropEr tests
        run: |
          mix test --only proper 2>&1 | head -100 || true
          mix proper --module Teiserver.Account.AuthLib --tests 100 2>&1 | head -50 || true
        continue-on-error: true
